build:
  gpu: true
  python_version: "3.12"

  system_packages:
    - "ffmpeg"
    - "libsndfile1"
    - "sox"

  python_requirements: requirements-cog.txt


predict: "predict.py:Predictor"

image: "r8.im/meta-innovation/heart_mula"

# Replicate Cog 配置 - HeartMuLa 音乐生成
# Cog 的 run 阶段无法访问本地项目（见文档 "Your code is not available to run"），
# 故用 python_requirements + 从 GitHub 安装 heartlib，predict.py 由 Cog 自动打入镜像。
# 使用前请先在 replicate.com/create 创建模型并选择 Public + GPU

build:
  gpu: true
  python_version: "3.12"
  cuda: "12.4"

  system_packages:
    - "ffmpeg"
    - "libsndfile1"
    - "sox"
  python_requirements: "requirements-cog.txt"

predict: "predict.py:Predictor"

image: "r8.im/meta-innovation/ultimate_rvc"
