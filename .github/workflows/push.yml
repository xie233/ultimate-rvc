# 参考：https://replicate.com/docs/guides/build/push-a-model-using-github-actions
# 需在 GitHub 仓库 Settings → Secrets 添加 REPLICATE_CLI_AUTH_TOKEN（从 replicate.com/auth/token 获取）
# 若启用 push 触发，在 Settings → Variables 添加 DEFAULT_MODEL_NAME（如 your-username/ultimate_rvc）
name: Push to Replicate

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: 'Replicate 模型名，如 your-username/ultimate_rvc'
        required: true
  push:
    branches:
      - main

jobs:
  push_to_replicate:
    name: Push to Replicate
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          docker-images: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_CLI_AUTH_TOKEN }}

      - name: Push to Replicate
        run: cog push r8.im/${{ inputs.model_name || vars.DEFAULT_MODEL_NAME }}
